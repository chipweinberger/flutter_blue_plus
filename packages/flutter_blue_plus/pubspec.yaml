name: flutter_blue_plus
description: Flutter plugin for connecting and communicating with Bluetooth Low Energy devices.
version: 2.3.2
homepage: https://github.com/chipweinberger/flutter_blue_plus

environment:
  sdk: ^3.0.0
  flutter: '>=3.7.0'

  # Internal release order for publishing to pub.dev:
  # Commands:
  #   0. cd /packages/flutter_blue_plus (if not already there)
  #   1. cd ../flutter_blue_plus_platform_interface && flutter pub publish
  #   2. cd ../flutter_blue_plus_android && flutter pub publish
  #   3. cd ../flutter_blue_plus_darwin && flutter pub publish
  #   4. cd ../flutter_blue_plus_linux && flutter pub publish
  #   5. cd ../flutter_blue_plus_web && flutter pub publish
  #   6. cd ../flutter_blue_plus && flutter pub publish

dependencies:
  flutter:
    sdk: flutter
  # use a constrained range instead of an exact version:
  #  - avoids pub.dev warnings about pinned dependencies
  #  - still forces all platform packages to stay perfectly in sync
  #    for simpler bug reports and unified changelog
  flutter_blue_plus_platform_interface: '>=9.0.0 <9.0.1'
  flutter_blue_plus_android: '>=9.0.0 <9.0.1'
  flutter_blue_plus_darwin: '>=9.0.0 <9.0.1'
  flutter_blue_plus_linux: '>=9.0.0 <9.0.1'
  flutter_blue_plus_web: '>=9.0.0 <9.0.1'

  # winrt intentionally not included:
  #  - avoids blocking FBP releases on Windows updates
  #  - Windows users can still add flutter_blue_plus_winrt manually
  #  - Windows endorsement is still kept because older winrt releases
  #    are often compatible with newer FBP releases.
  #flutter_blue_plus_winrt: 

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_blue_plus_android
      ios:
        default_package: flutter_blue_plus_darwin
      linux:
        default_package: flutter_blue_plus_linux
      macos:
        default_package: flutter_blue_plus_darwin
      web:
        default_package: flutter_blue_plus_web
      windows:
        default_package: flutter_blue_plus_winrt
