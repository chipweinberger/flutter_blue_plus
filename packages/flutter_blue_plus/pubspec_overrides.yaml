# pubspec_overrides.yaml
#
# Purpose: use local sibling packages so this federated plugin repo can be
# developed and tested as one workspace, without needing to
# edit the pubspec.yaml every time.
#
# This is a standard local-development setup for federated plugin repos.
#
# These overrides only apply when you run `flutter pub get` in this app, and
# they replace the normal pub.dev versions with local path dependencies.
#
# The overrides are ignored when publishing packages to pub.dev, so releases
# and package users still resolve the published dependency versions.

dependency_overrides:
  flutter_blue_plus_platform_interface:
    path: ../flutter_blue_plus_platform_interface
  flutter_blue_plus_android:
    path: ../flutter_blue_plus_android
  flutter_blue_plus_darwin:
    path: ../flutter_blue_plus_darwin
  flutter_blue_plus_linux:
    path: ../flutter_blue_plus_linux
  flutter_blue_plus_web:
    path: ../flutter_blue_plus_web
