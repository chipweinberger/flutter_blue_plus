name: core_bluetooth
description: CoreBluetooth wrapper for Dart on iOS and macOS.
version: 3.0.0
homepage: https://github.com/chipweinberger/flutter_blue_plus/tree/feature/native-bluetooth-packages/packages/core_bluetooth
repository: https://github.com/chipweinberger/flutter_blue_plus/tree/feature/native-bluetooth-packages/packages/core_bluetooth

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: CoreBluetoothPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: CoreBluetoothPlugin
        sharedDarwinSource: true
